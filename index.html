<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hole in Sum – Firebase Leaderboard</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #leaderboard div { padding: 4px 0; }
  </style>
</head>

<body>

  <h1>Hole in Sum – Leaderboard Test</h1>

  <!-- Test UI -->
  <input id="playerName" placeholder="Name">
  <input id="playerScore" type="number" placeholder="Strokes">
  <button onclick="testSubmit()">Submit Score</button>

  <h2>Today's Leaderboard</h2>
  <div id="leaderboard">Loading…</div>

  <!-- Firebase + Leaderboard Code -->
  <script type="module">

    /* ---------------------------------------------------------
       1. IMPORT FIREBASE MODULES
    --------------------------------------------------------- */
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
    import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    /* ---------------------------------------------------------
       2. YOUR FIREBASE CONFIG
    --------------------------------------------------------- */
    const firebaseConfig = {
      apiKey: "AIzaSyAsvCV3B6U3iuyl2B4hD6s-31ow0taZj4A",
      authDomain: "hole-in-sum-4a55e.firebaseapp.com",
      databaseURL: "https://hole-in-sum-4a55e-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "hole-in-sum-4a55e",
      storageBucket: "hole-in-sum-4a55e.firebasestorage.app",
      messagingSenderId: "257652493862",
      appId: "1:257652493862:web:ae7c41ee93aeb1213aa0e7",
      measurementId: "G-RCN31EM9KN"
    };

    /* ---------------------------------------------------------
       3. INITIALISE FIREBASE
    --------------------------------------------------------- */
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getDatabase(app);

    /* ---------------------------------------------------------
       4. SAVE SCORE TO FIREBASE
    --------------------------------------------------------- */
    function submitScore(name, strokes) {
      const today = new Date().toISOString().split("T")[0];
      const scoreRef = ref(db, "leaderboard/" + today + "/" + name);

      return set(scoreRef, {
        strokes: strokes,
        timestamp: Date.now()
      });
    }

    /* ---------------------------------------------------------
       5. LOAD TODAY'S LEADERBOARD
    --------------------------------------------------------- */
    async function loadLeaderboard() {
      const today = new Date().toISOString().split("T")[0];
      const snapshot = await get(child(ref(db), "leaderboard/" + today));

      if (!snapshot.exists()) return [];

      const data = snapshot.val();

      return Object.entries(data)
        .map(([name, entry]) => ({ name, strokes: entry.strokes }))
        .sort((a, b) => a.strokes - b.strokes);
    }

    /* ---------------------------------------------------------
       6. DISPLAY LEADERBOARD
    --------------------------------------------------------- */
    async function showLeaderboard() {
      const scores = await loadLeaderboard();
      const container = document.getElementById("leaderboard");

      if (scores.length === 0) {
        container.innerHTML = "No scores yet today.";
        return;
      }

      container.innerHTML = scores
        .map(s => `<div><strong>${s.name}</strong>: ${s.strokes}</div>`)
        .join("");
    }

    /* ---------------------------------------------------------
       7. TEST BUTTON (REMOVE LATER)
    --------------------------------------------------------- */
    window.testSubmit = async function () {
      const name = document.getElementById("playerName").value;
      const strokes = Number(document.getElementById("playerScore").value);

      if (!name || !strokes) {
        alert("Enter name and score");
        return;
      }

      await submitScore(name, strokes);
      showLeaderboard();
    };

    // Load leaderboard on page load
    showLeaderboard();

  </script>

</body>
</html>
